site_name: 知识库 | Paper & Code Notes
site_description: 记录论文阅读与代码沉淀
site_author: YouHuang67
site_url: https://YouHuang67.github.io/paper-code-notes/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/tag_search.js?v=5
  - javascripts/home.js?v=4
  - javascripts/paper_index.js?v=6
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css?v=10
  - stylesheets/tag_search.css?v=4

